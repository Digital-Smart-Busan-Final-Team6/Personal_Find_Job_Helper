{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 매칭 분석 리포트</title>
    <!-- 1. 기본 라이브러리 (Bootstrap, FontAwesome, Font) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- 2. 추가 라이브러리 (Markdown 렌더링, 스크롤 애니메이션) -->
    <script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        :root {
            --primary-color: #000080; /* Navy */
            --primary-light: #e6e6ff;
            --text-dark: #1a2b48;
            --text-light: #6c757d;
        }

        body {
            background-color: #f8f9fc;
            font-family: 'Pretendard', sans-serif;
            padding-left: 80px; /* 사이드바 기본 너비 */
            color: #343a40;
            transition: padding-left 0.3s ease-in-out;
        }
        body:has(.sidebar:hover) {
            padding-left: 240px; /* 사이드바 확장 너비 */
        }
        .content-area {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: transparent;
            background: linear-gradient(90deg, var(--primary-color), #4a90e2);
            background-clip: text;
            -webkit-background-clip: text;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 상단 요약 섹션 */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 50px;
        }
        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.07);
        }
        .summary-card h5 {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .summary-card h5 i {
            margin-right: 10px;
            font-size: 1.2em;
        }
        .summary-card ul {
            list-style: none;
            padding-left: 0;
            margin-bottom: 0;
        }
        .summary-card li {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-weight: 600;
        }
        .summary-card li:last-child {
            border-bottom: none;
        }

        /* AI 분석 리포트 섹션 */
        .report-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .report-header {
            padding: 20px 30px;
            background: linear-gradient(135deg, var(--primary-color), #2a3f85);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .report-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .action-buttons button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 15px;
            margin-left: 10px;
            transition: all 0.2s;
        }
        .action-buttons button:hover {
            background: white;
            color: var(--primary-color);
        }

        /* Markdown 렌더링 결과 스타일 */
        .report-output {
            padding: 40px;
            line-height: 1.9;
            font-size: 1.05rem;
            color: #333;
        }
        .report-output h1, .report-output h2, .report-output h3 {
            font-weight: 700;
            color: var(--text-dark);
            margin-top: 2.5rem;
            margin-bottom: 1.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-light);
        }
        .report-output h2 { font-size: 1.6rem; }
        .report-output h3 { font-size: 1.3rem; }
        .report-output p { margin-bottom: 1.2rem; }
        .report-output ul, .report-output ol { padding-left: 25px; margin-bottom: 1.2rem; }
        .report-output li { margin-bottom: 0.5rem; }
        .report-output strong { color: var(--primary-color); font-weight: 700; }
        .report-output code {
            background-color: #f1f1f1;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="resume-page">
    {% include '_sidebar.html' %}

    <div class="content-area">
        <h1 class="page-title" data-aos="fade-down">이력-공고 매칭 리포트</h1>

        <!-- 상단 요약 정보 -->
        <div class="summary-grid">
            <div class="summary-card" data-aos="fade-up">
                <h5><i class="fas fa-file-alt"></i>분석 대상 이력서</h5>
                <ul>
                    {% for resume in resumes %}
                    <li>{{ resume.title }}</li>
                    {% endfor %}
                </ul>
            </div>
            <div class="summary-card" data-aos="fade-up" data-aos-delay="100">
                <h5><i class="fas fa-bullseye"></i>분석 대상 공고</h5>
                <p class="text-muted">상세 내용은 아래 AI 분석 리포트에 포함되어 있습니다.</p>
            </div>
        </div>

        <!-- AI 분석 결과 -->
        <div class="report-container" data-aos="fade-up" data-aos-delay="200">
            <div class="report-header">
                <h2><i class="fas fa-microchip"></i> AI 심층 분석 결과</h2>
                <div class="action-buttons">
                    <button id="copy-btn"><i class="fas fa-copy"></i> 내용 복사</button>
                    <button id="print-btn"><i class="fas fa-print"></i> 인쇄</button>
                </div>
            </div>
            <!-- Markdown으로 렌더링될 영역 -->
            <div id="report-output" class="report-output">
                <!-- 로딩 스피너 (JavaScript로 즉시 교체됨) -->
                <div class="d-flex justify-content-center align-items-center p-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <strong class="ms-3">리포트를 렌더링하고 있습니다...</strong>
                </div>
            </div>
        </div>
        
        <!-- AI가 생성한 원본 텍스트 (숨김) 
         <div id="raw-markdown" style="display:none;">{{ report_content|escapejs }}</div>-->
        {{ report_content|json_script:"raw-markdown-data" }}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 스크롤 애니메이션 라이브러리 초기화
            AOS.init({
                duration: 800, // 애니메이션 지속 시간
                once: true,    // 한 번만 실행
            });

            // 2. Markdown 렌더링
            const markdownText = JSON.parse(document.getElementById('raw-markdown-data').textContent);
            
            const reportOutput = document.getElementById('report-output');
            
            // Showdown.js 변환기 생성
            const converter = new showdown.Converter({
                tables: true, // 테이블 변환 활성화
                strikethrough: true, // 취소선 변환 활성화
                tasklists: true, // 할 일 목록 변환 활성화
                simpleLineBreaks: true // 간단한 줄바꿈(\n)을 <br>로 변환
            });
            
            // Markdown을 HTML로 변환하여 삽입
            const htmlContent = converter.makeHtml(markdownText);
            reportOutput.innerHTML = htmlContent;

            // 3. 버튼 기능 추가
            const copyBtn = document.getElementById('copy-btn');
            const printBtn = document.getElementById('print-btn');

            // 내용 복사 버튼
            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(markdownText).then(() => {
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> 복사 완료!';
                    setTimeout(() => {
                        copyBtn.innerHTML = '<i class="fas fa-copy"></i> 내용 복사';
                    }, 2000);
                }).catch(err => {
                    console.error('복사 실패:', err);
                    alert('리포트 내용 복사에 실패했습니다.');
                });
            });

            // 인쇄 버튼
            printBtn.addEventListener('click', function() {
                window.print();
            });
        });
    </script>
</body>
</html>
