<!DOCTYPE html>
<html lang="en">
<head>
  {% csrf_token %}
  <meta charset="UTF-8">
  <title>Helper</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Orbitron', sans-serif;
      color: white;
      overflow: hidden;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(rgba(0, 0, 50, 0.6), rgba(0, 0, 30, 0.9));
      background-size: cover;
      background-position: center;
    }

    .top-right {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }

    .top-right a {
      display: inline-block;
      padding: 8px 15px;
      font-size: 1.1rem;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      transition: background-color 0.3s, color 0.3s;
      margin-left: 10px;
    }

    .top-right a:first-child {
      margin-left: 0;
    }

    .top-right a:hover {
      background-color: rgba(255, 255, 255, 0.2);
      color: #aaaaff;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .title {
      font-size: 5rem;
      letter-spacing: 0.1em;
      opacity: 0;
      margin-bottom: 40px;
    }

    .chat-input {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      padding: 12px 20px;
      width: 60%;
      max-width: 600px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.3);
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 1.2rem;
    }

    .chat-input button {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s;
    }

    .chat-input button:hover {
      color: #aaaaff;
    }

    .chatbox {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 800px;
      max-height: 60vh;
      overflow-y: auto;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 20px;
      word-break: break-word;
      line-height: 1.4;
    }

    .user {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
    }

    .bot {
      align-self: flex-end;
      background: rgba(170, 170, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="top-right">
    {% if user.is_authenticated %}
      <a href="{% url 'mypage' %}">My Page</a>
      <a href="{% url 'logout' %}" style="margin-left: 15px;">Sign Out</a>
    {% else %}
      <a href="{% url 'login' %}">Sign In</a>
      <a href="{% url 'register' %}" style="margin-left: 15px;">Register</a>
    {% endif %}
  </div>

  <div class="container" id="home-container">
    <div class="title" id="helper-title">Helper</div>
    <div class="chat-input">
      <input type="text" id="home-input" placeholder="무엇을 도와드릴까요?" />
      <button id="start-chat">➤</button>
    </div>
  </div>

  <div class="chatbox" id="chatbox"></div>
  <div class="chat-input" id="chat-input-container" style="display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 60%; max-width: 600px;">
    <input type="text" id="chat-input" placeholder="메시지를 입력하세요...">
    <button id="send-btn">➤</button>
  </div>

  <script>
    const title = document.getElementById('helper-title');
    const text = "Helper";
    let revealed = Array(text.length).fill(false);

    function showRandomChar() {
      const hidden = revealed.map((v, i) => !v ? i : -1).filter(i => i !== -1);
      if (hidden.length === 0) return;
      const i = hidden[Math.floor(Math.random() * hidden.length)];
      revealed[i] = true;
      title.textContent = text.split('').map((c, idx) => revealed[idx] ? c : '_' ).join('');
      setTimeout(showRandomChar, 120);
    }

    setTimeout(() => {
      gsap.to(title, { opacity: 1, duration: 1.5 });
      showRandomChar();
    }, 500);

    const homeInput = document.getElementById("home-input");
    const chatInput = document.getElementById("chat-input");
    const chatbox = document.getElementById("chatbox");
    const homeContainer = document.getElementById("home-container");
    const chatInputContainer = document.getElementById("chat-input-container");

    // chat_api 와 home에 있는 채팅창 연동하기
    async function sendMessage(message) {
      if (!message.trim()) return;
  
      appendMessage(message, "user");
  
      try {
        const response = await fetch("/chat/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken") // CSRF 토큰 포함
          },
          body: JSON.stringify({ message: message })
        });
  
        const data = await response.json();
        appendMessage(data.response, "bot");
      } catch (error) {
        appendMessage("에러가 발생했어요. 잠시 후 다시 시도해 주세요.", "bot");
        console.error("Error:", error);
      }
    }
    
    function appendMessage(message, sender) {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message");
      msgDiv.classList.add(sender);
      msgDiv.textContent = message;
      chatbox.appendChild(msgDiv);
      chatbox.scrollTop = chatbox.scrollHeight;  // 자동 스크롤 맨 아래로
    }
    
    // CSRF 토큰 가져오기 함수
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          // 쿠키 이름으로 시작하는지 확인
          if (cookie.substring(0, name.length + 1) === name + "=") {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    document.getElementById("start-chat").addEventListener("click", () => {
      const message = homeInput.value;
      if (!message.trim()) return;
      gsap.to(homeContainer, { y: "-100%", opacity: 0, duration: 1, onComplete: () => {
        homeContainer.style.display = "none";
        chatbox.style.display = "flex";
        chatInputContainer.style.display = "flex";
        sendMessage(message);
      }});
    });

    homeInput.addEventListener("keypress", e => {
      if (e.key === "Enter") document.getElementById("start-chat").click();
    });

    document.getElementById("send-btn").addEventListener("click", () => {
      sendMessage(chatInput.value);
      chatInput.value = "";
    });

    chatInput.addEventListener("keypress", e => {
      if (e.key === "Enter") {
        sendMessage(chatInput.value);
        chatInput.value = "";
      }
    });
  </script>

  <script>
    particlesJS("particles-js", {
      particles: {
        number: {
          value: 120,
          density: { enable: true, value_area: 1000 }
        },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: {
          value: 0.6,
          random: true,
          anim: {
            enable: true,
            speed: 0.5,
            opacity_min: 0.1,
            sync: false
          }
        },
        size: { value: 2, random: true },
        move: {
          enable: true,
          speed: 0.35,
          direction: "none",
          random: true,
          straight: false,
          out_mode: "out"
        },
        line_linked: { enable: false }
      },
      interactivity: {
        events: {
          onhover: { enable: false },
          onclick: { enable: false }
        }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
