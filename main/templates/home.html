<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helper</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Orbitron', sans-serif;
      color: white;
      overflow: hidden;
    }

    #particles-js {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: 
          linear-gradient(rgba(0, 0, 50, 0.6), rgba(0, 0, 30, 0.9));
        background-size: cover;
        background-position: center;
        animation: none; /* 기존 애니메이션 제거 */
      }
      

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
          filter: brightness(1) saturate(1.2);
        }
        50% {
          background-position: 100% 50%;
          filter: brightness(1.3) saturate(1.6);
        }
        100% {
          background-position: 0% 50%;
          filter: brightness(1) saturate(1.2);
        }
      }
      
      

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
      text-align: center;
    }

    .title {
      font-size: 5rem;
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
    }

    @keyframes fadeIn {
      0% { opacity: 0; filter: blur(4px); }
      100% { opacity: 1; filter: blur(0); }
    }

    .chat-input {
      margin-top: 40px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      padding: 12px 20px;
      width: 60%;
      max-width: 600px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.3);
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 1.2rem;
    }

    .chat-input button {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s;
    }

    .chat-input button:hover {
      color: #aaaaff;
    }

    .top-right a {
        display: inline-block;  /* inline-block으로 설정 */
        padding: 8px 15px;     /* 패딩 주기 */
        font-size: 1.1rem;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.1); /* 약간 배경 넣어주면 버튼처럼 보임 */
        transition: background-color 0.3s, color 0.3s;
        margin-left: 10px;
      }
      
      .top-right a:first-child {
        margin-left: 0;
      }
      
      .top-right a:hover {
        background-color: rgba(255, 255, 255, 0.2);
        color: #aaaaff;
      }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="top-right" style="position: absolute; top: 20px; right: 20px; z-index: 9999;">
    {% if user.is_authenticated %}
      <a href="{% url 'mypage' %}">My Page</a>
      <a href="{% url 'logout' %}" style="margin-left: 15px;">Sign Out</a>
    {% else %}
      <a href="{% url 'login' %}">Sign In</a>
      <a href="{% url 'register' %}" style="margin-left: 15px;">Register</a>
    {% endif %}
  </div>
  

  <div class="container">
    <div class="title" id="helper-title">Helper</div>
    <div class="chat-input">
      <input type="text" placeholder="무엇을 도와드릴까요?" />
      <button>➤</button>
    </div>
  </div>

  <script>
    const title = document.getElementById('helper-title');
    const text = "Helper";
    let revealed = Array(text.length).fill(false);

    function showRandomChar() {
      const hidden = revealed.map((v, i) => !v ? i : -1).filter(i => i !== -1);
      if (hidden.length === 0) return;

      const i = hidden[Math.floor(Math.random() * hidden.length)];
      revealed[i] = true;

      title.textContent = text.split('').map((c, idx) => revealed[idx] ? c : '_' ).join('');
      setTimeout(showRandomChar, 120);
    }

    setTimeout(showRandomChar, 500);
  </script>

  <script>
    particlesJS("particles-js", {
        particles: {
          number: {
            value: 120,
            density: { enable: true, value_area: 1000 }
          },
          color: { value: "#ffffff" },
          shape: {
            type: "circle"
          },
          opacity: {
            value: 0.6,
            random: true,
            anim: {
              enable: true,
              speed: 0.5,
              opacity_min: 0.1,
              sync: false
            }
          },
          size: {
            value: 2,
            random: true
          },
          move: {
            enable: true,
            speed: 0.35,
            direction: "none",
            random: true,
            straight: false,
            out_mode: "out"
          },
          line_linked: {
            enable: false  // 선 연결 제거
          }
        },
        interactivity: {
          events: {
            onhover: { enable: false },
            onclick: { enable: false }
          }
        },
        retina_detect: true
      });
      
  </script>
</body>
</html>
