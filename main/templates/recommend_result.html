{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 추천 공고</title>
    <!-- 기본 라이브러리 및 폰트 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* [디자인 시스템] */
        :root {
            --primary-color: #4A5C9F;
            --primary-gradient: linear-gradient(135deg, #647DEE 0%, #4A5C9F 100%);
            --background-color: #F7F8FC;
            --card-background: #FFFFFF;
            --text-primary: #1A2B48;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
            --progress-bar-bg: #E0E7FF;
            --selected-glow: rgba(74, 92, 159, 0.2);
            --primary-light: #e9f0ff; /* 사이드바를 위해 추가 */
        }

        /* [애니메이션] */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ▼▼▼ 1. 사용자 행동 유도를 위한 미세한 애니메이션 추가 ▼▼▼ */
        @keyframes pulse-glow {
            0% { box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
            50% { box-shadow: 0 8px 25px rgba(74, 92, 159, 0.1); }
            100% { box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        }

        body {
            background-color: var(--background-color);
            font-family: 'Pretendard', sans-serif;
            color: var(--text-primary);
            padding-bottom: 150px;
            /* 사이드바 관련 스타일은 다른 페이지와 통일 */
            padding-left: 80px;
            transition: padding-left 0.3s ease-in-out;
        }
        body:has(.sidebar:hover) {
            padding-left: 240px;
        }
        
        .container {
            max-width: 800px;
            padding-top: 60px;
            padding-bottom: 60px;
        }

        /* ▼▼▼ 2. 사이드바 스타일 추가 (기존 폼 페이지와 통일) ▼▼▼ */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 80px;
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            padding-top: 20px;
            transition: width 0.3s ease-in-out;
            z-index: 1030;
            overflow: hidden;
        }
        .sidebar:hover { width: 240px; }
        .nav-pills .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #495057;
            font-weight: 600;
            padding: 13px 25px;
            margin-bottom: 8px;
            border-radius: 0; /* 좌측 정렬을 위해 둥글기 제거 */
            transition: all 0.2s ease-in-out;
            white-space: nowrap;
        }
        .nav-pills .nav-link .menu-icon {
            font-size: 1.2rem;
            min-width: 30px;
            text-align: center;
        }
        .nav-pills .nav-link:hover {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }
        .nav-pills .nav-link.active {
            background: var(--primary-color);
            color: white;
        }

        .page-header {
            text-align: center;
            margin-bottom: 20px; /* 안내 문구를 위해 여백 조정 */
            animation: fadeInUp 0.5s ease-out;
        }
        .page-title { /* ... 변경 없음 ... */ }
        .page-subtitle { /* ... 변경 없음 ... */ }
        
        /* ▼▼▼ 3. 사용자 안내를 위한 새로운 스타일 추가 ▼▼▼ */
        .instruction-text {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-secondary);
            background-color: var(--primary-light);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 40px;
            animation: fadeInUp 0.5s ease-out 0.2s;
            opacity: 0;
            animation-fill-mode: forwards;
        }
        .instruction-text .fa-lightbulb {
            color: var(--primary-color);
            margin-right: 8px;
        }

        .job-card { /* ... 다른 스타일은 이전과 동일 ... */
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
        /* 선택되지 않았을 때의 미세한 애니메이션 */
        .job-card.pulse:not(:hover) {
            animation: pulse-glow 2s infinite ease-in-out;
        }
        
        /* ... 이하 모든 스타일은 이전과 동일 ... */
    </style>
</head>
<body>
    <!-- ▼▼▼ 4. 사이드바 HTML 구조 추가 (기존 _sidebar.html과 동일한 구조) ▼▼▼ -->
    <div class="sidebar">
        <div class="nav flex-column nav-pills">
             <!-- 현재 페이지에 맞게 active 클래스를 동적으로 부여해야 합니다. -->
            <a class="nav-link active" href="#">
                <i class="fas fa-lightbulb menu-icon"></i>
                <span>추천기반 리포트 생성</span>
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-search menu-icon"></i>
                <span>공고검색 리포트 생성</span>
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-file-alt menu-icon"></i>
                <span>매칭 리포트</span>
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-comments menu-icon"></i>
                <span>대화 목록</span>
            </a>
        </div>
    </div>

    <!-- body 태그에 padding-left가 적용되었으므로, .content-area를 사용합니다. -->
    <div class="content-area">
        <div class="page-header">
            <h1 class="page-title">AI 추천 결과</h1>
            <p class="page-subtitle">이력서를 기반으로 가장 적합한 공고를 찾았습니다.</p>
        </div>
        
        <!-- ▼▼▼ 5. 사용자 안내 문구 추가 ▼▼▼ -->
        <div class="instruction-text">
            <i class="fas fa-lightbulb"></i>분석하고 싶은 공고를 클릭하여 선택한 후, 하단 버튼으로 리포트를 생성하세요.
        </div>
        
        <form action="{% url 'generate_final_report' %}" method="post" id="final-report-form">
            {% csrf_token %}
            <input type="hidden" name="resume_ids" value="{{ resume_ids_str }}">
            
            <div id="job-list-container">
                {% for job in recommended_jobs %}
                <div class="job-card" data-job-id="{{ job.id }}" style="--animation-order: {{ forloop.counter0 }};">
                    <!-- 카드 내부 구조는 이전과 동일, 완벽합니다. -->
                    <!-- ... -->
                </div>
                {% endfor %}
            </div>

            <div class="report-fab-container">
                <button type="submit" class="generate-btn" id="generate-report-btn">
                    <i class="fas fa-wand-magic-sparkles"></i>
                    리포트 생성할 공고 선택
                </button>
            </div>
        </form>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const jobCards = document.querySelectorAll('.job-card');
        const submitButton = document.getElementById('generate-report-btn');

        // ▼▼▼ 6. 행동 유도를 위한 애니메이션 제어 로직 추가 ▼▼▼
        let pulseInterval;

        function startPulseAnimation() {
            // 3초마다 모든 카드에 pulse 클래스를 추가했다가 제거합니다.
            pulseInterval = setInterval(() => {
                jobCards.forEach(card => card.classList.add('pulse'));
                setTimeout(() => {
                    jobCards.forEach(card => card.classList.remove('pulse'));
                }, 1000); // 1초 동안만 반짝임
            }, 3000);
        }

        function stopPulseAnimation() {
            clearInterval(pulseInterval);
            jobCards.forEach(card => card.classList.remove('pulse'));
        }
        
        // 페이지 로드 시 애니메이션 시작
        startPulseAnimation();

        jobCards.forEach(card => {
            card.addEventListener('click', function() {
                this.classList.toggle('selected');
                const checkbox = this.querySelector('.job-checkbox');
                checkbox.checked = !checkbox.checked;
                updateButtonState();
            });
        });

        function updateButtonState() {
            const selectedCards = document.querySelectorAll('.job-card.selected');
            
            if (selectedCards.length > 0) {
                // 하나라도 선택되면, 더 이상 행동 유도 애니메이션이 필요 없으므로 중지합니다.
                stopPulseAnimation();
                submitButton.classList.add('visible');
                submitButton.innerHTML = `<i class="fas fa-wand-magic-sparkles"></i> ${selectedCards.length}개 공고로 리포트 생성`;
            } else {
                // 아무것도 선택되지 않으면, 다시 행동 유도 애니메이션을 시작합니다.
                startPulseAnimation();
                submitButton.classList.remove('visible');
            }
        }
    });
    </script>
</body>
</html>
