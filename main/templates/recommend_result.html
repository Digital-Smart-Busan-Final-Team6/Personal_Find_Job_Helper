{% comment %} main/templates/recommend_result.html {% endcomment %}

{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>추천 공고 목록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000080;
        }
        body {
            background-color: #f4f4f8; font-family: 'Pretendard', sans-serif;
            padding-left: 80px; color: #343a40; transition: padding-left 0.3s ease-in-out;
            padding-bottom: 120px;
        }
        body:has(.sidebar:hover) { padding-left: 240px; }
        .content-area { max-width: 900px; margin: 0 auto; padding: 50px 20px; }
        .page-prompt {
            font-size: 1.2rem; font-weight: 600;
            color: #1a2b48; margin-bottom: 30px;
        }
        .job-card {
            background-color: white; border-radius: 16px; padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
            border: 2px solid transparent; transition: all 0.3s;
            display: flex; align-items: center; cursor: pointer; /* ★ 커서를 포인터로 변경 */
            margin-bottom: 20px;
        }
        .job-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.06);
        }
        .job-card.selected {
            border-color: var(--primary-color);
            transform: translateY(0);
            box-shadow: 0 0 0 3px var(--primary-color), 0 4px 6px rgba(0,0,0,0.08);
        }
        .job-info { flex-grow: 1; }
        .job-info h5 { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; }
        .job-info p { font-size: 0.95rem; color: #6c757d; margin: 0; }
        .job-checkbox {
            margin-left: 20px; width: 24px; height: 24px;
            accent-color: var(--primary-color);
            /* ★ 사용자가 직접 상호작용할 필요 없으므로 클릭 이벤트를 막음 */
            pointer-events: none; 
        }
        .report-fab-container {
            position: fixed; bottom: 30px; left: calc(50% + 40px);
            transform: translateX(-50%); width: 90%; max-width: 600px;
            z-index: 999; transition: left 0.3s ease-in-out;
        }
        body:has(.sidebar:hover) .report-fab-container { left: calc(50% + 120px); }
        .generate-btn {
            width: 100%; padding: 18px; font-size: 1.1rem; font-weight: 700;
            border-radius: 16px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background-color: #a9a9d4; color: #eef2ff; cursor: not-allowed; transition: all 0.3s;
        }
        .generate-btn:not(:disabled) {
            background-color: var(--primary-color); color: white; cursor: pointer;
        }
    </style>
</head>
<body class="resume-page">
    {% include '_sidebar.html' %}

    <div class="content-area">
        <div class="page-prompt">이력 사항을 바탕으로 다음 공고들을 추천 드립니다</div>
        
        <!-- ▼▼▼ 1. 공고 목록은 폼 바깥으로 이동 ▼▼▼ -->
        <div id="job-list-container">
            {% for job in recommended_jobs %}
            <div class="job-card" data-job-id="{{ job.id }}">
                <div class="job-info">
                    <h5>{{ job.company }} - {{ job.title }}</h5>
                    <p>{{ job.location|default:"정보 없음" }}</p>
                </div>
                <!-- 체크박스는 시각적 요소로만 사용 -->
                <input type="checkbox" class="job-checkbox" value="{{ job.id }}">
            </div>
            {% endfor %}
        </div>

        <!-- ▼▼▼ 2. 최종 제출을 위한 별도의 폼 생성 ▼▼▼ -->
        <div class="report-fab-container">
            <form action="{% url 'generate_final_report' %}" method="post" id="final-report-form">
                {% csrf_token %}
                <!-- (A) 이력서 ID를 여기에 포함 -->
                <input type="hidden" name="resume_ids" value="{{ resume_ids_str }}">
                
                <!-- (B) JavaScript가 선택된 공고 ID를 여기에 추가할 영역 -->
                <div id="selected-jobs-hidden-inputs"></div>

                <button type="submit" class="generate-btn" id="generate-report-btn" disabled>
                    매칭 리포트를 생성할 공고를 선택해주세요
                </button>
            </form>
        </div>
    </div>

    <!-- ▼▼▼ 3. 스크립트 전체 수정 ▼▼▼ -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const jobCards = document.querySelectorAll('.job-card');
        const submitButton = document.getElementById('generate-report-btn');
        const selectedJobsContainer = document.getElementById('selected-jobs-hidden-inputs');

        jobCards.forEach(card => {
            card.addEventListener('click', function() {
                // 카드 클릭 시 selected 클래스 토글
                this.classList.toggle('selected');
                
                // 카드 안의 체크박스 상태도 함께 토글
                const checkbox = this.querySelector('.job-checkbox');
                checkbox.checked = !checkbox.checked;

                // 폼 상태 업데이트 함수 호출
                updateFormState();
            });
        });

        function updateFormState() {
            const selectedCards = document.querySelectorAll('.job-card.selected');
            
            // 버튼 활성화/비활성화 및 텍스트 변경
            if (selectedCards.length > 0) {
                submitButton.disabled = false;
                submitButton.textContent = `${selectedCards.length}개 공고로 리포트 생성하기`;
            } else {
                submitButton.disabled = true;
                submitButton.textContent = '매칭 리포트를 생성할 공고를 선택해주세요';
            }
            
            // 숨겨진 input 필드 업데이트
            selectedJobsContainer.innerHTML = ''; // 기존 내용 초기화
            selectedCards.forEach(card => {
                const hiddenInput = document.createElement('input');
                hiddenInput.type = 'hidden';
                hiddenInput.name = 'selected_jobs';
                hiddenInput.value = card.dataset.jobId; // data-job-id 속성에서 값 가져오기
                selectedJobsContainer.appendChild(hiddenInput);
            });
        }
    });
    </script>
</body>
</html>
