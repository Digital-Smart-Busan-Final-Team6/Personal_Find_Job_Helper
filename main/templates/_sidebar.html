{% comment %} main/templates/_sidebar.html {% endcomment %}

<style>
  /* 1. 사이드바 기본 틀 */
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    width: 80px;
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: width 0.3s ease-in-out;
    z-index: 100;
  }
  .sidebar:hover {
    width: 240px;
    align-items: flex-start;
  }

  /* 2. 사이드바 헤더 */
  .sidebar-header {
    width: 100%;
    margin-bottom: 40px;
    padding: 0 28px;
    flex-shrink: 0;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease-in-out;
    box-sizing: border-box;
  }
  .sidebar:hover .sidebar-header {
    justify-content: space-between;
  }

  /* 3. 헤더 안의 아이콘들 */
  .menu-toggle, .page-switch-icon {
    font-size: 1.5rem;
    color: #a9a9d4;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.2s;
  }

  .page-switch-icon {
    display: none;
  }
  .sidebar:hover .page-switch-icon {
    display: inline-block;
  }
  .page-switch-icon:hover {
    color: white;
  }

  /* 4. 메뉴 목록 */
  .nav-menu {
    list-style: none;
    padding: 0;
    margin: 0;
    width: 100%;
  }
  .nav-item a {
    display: flex;
    align-items: center;
    padding: 15px 28px;
    color: #a9a9d4;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
    gap: 20px;
  }
  .nav-item a:hover {
    background: rgba(255, 255, 255, 0.1);
    color: white;
  }

  .nav-item a.active {
    background: rgba(255, 255, 255, 0.15);
    color: white;
    font-weight: 700;
    box-shadow: inset 3px 0 0 0 white;
  }
  
  .nav-icon {
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .nav-text {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s ease-in-out;
  }
  .sidebar:hover .nav-text {
    opacity: 1;
    transition-delay: 0.1s;
  }

  /* 5. 메뉴 구분선 */
  .divider {
      height: 1px;
      background-color: rgba(255, 255, 255, 0.1);
      margin: 20px 20px;
  }
  .sidebar:hover .divider {
      margin: 20px 28px;
  }

  /* 6. 각 페이지별 사이드바 배경색 */
  body.home-page .sidebar {
      background: rgba(16, 16, 46, 0.25);
      backdrop-filter: blur(12px);
  }
  body.resume-page .sidebar {
      background: #000080;
  }

  .page-switch-icon i {
    display: inline-block;
    transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .page-switch-icon:hover i {
    transform: rotate(360deg);
  }
</style>

<nav class="sidebar">
  <div class="sidebar-header">
    <i class="fas fa-bars menu-toggle"></i>
    <a href="{% url switch_url_name %}" class="page-switch-icon">
      <i class="fas fa-sync-alt"></i>
    </a>
  </div>
  <ul class="nav-menu">
    {% if current_page == 'home' %}
    <li class="nav-item">
      <a href="#">
        <i class="fas fa-plus-square fa-fw nav-icon"></i> <!-- ★★★ fa-fw 추가 ★★★ -->
        <span class="nav-text">새 채팅</span>
      </a>
    </li>
    <li class="nav-item">
      <a href="#">
        <i class="fas fa-list-ul fa-fw nav-icon"></i> <!-- ★★★ fa-fw 추가 ★★★ -->
        <span class="nav-text">채팅 목록</span>
      </a>
    </li>
    {% elif current_page == 'resume' %}
    <li class="nav-item">
      <a href="#" id="start-recommend-report">
        <i class="fas fa-lightbulb fa-fw nav-icon"></i> <!-- ★★★ fa-fw 추가 ★★★ -->
        <span class="nav-text">추천기반 리포트 생성</span>
      </a>
    </li>
    <li class="nav-item">
      <a href="#" id="start-job-search-report">
        <i class="fas fa-search fa-fw nav-icon"></i> <!-- ★★★ fa-fw 추가 ★★★ -->
        <span class="nav-text">공고검색 리포트 생성</span>
      </a>
    </li>
    <div class="divider"></div>
    <li class="nav-item">
      <a href="#">
        <i class="fas fa-file-alt fa-fw nav-icon"></i> <!-- ★★★ fa-fw 추가 ★★★ -->
        <span class="nav-text">매칭 리포트</span>
      </a>
    </li>
    <li class="nav-item">
      <a href="#">
        <i class="fas fa-comments fa-fw nav-icon"></i> <!-- ★★★ fa-fw 추가 ★★★ -->
        <span class="nav-text">대화 목록</span>
      </a>
    </li>
    {% endif %}
  </ul>
</nav>
