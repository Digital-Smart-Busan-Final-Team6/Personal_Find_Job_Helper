<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register - Helper</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Orbitron', sans-serif;
      color: white;
      overflow-y: auto;
      background: linear-gradient(rgba(0, 40, 90, 0.6), rgba(0, 20, 60, 0.9));
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    
    .container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 40px;
      box-sizing: border-box;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 60px 80px;
      backdrop-filter: blur(20px);
      box-shadow: 0 12px 48px rgba(31, 38, 135, 0.4);
      width: 100%;
      max-width: 500px;
      text-align: left;
      font-size: 1.1rem;
    }

    .form-label {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
    }

    .form-input {
      width: 100%;
      box-sizing: border-box;
      padding: 16px 20px;
      margin-bottom: 24px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.25);
      color: white;
    }

    button {
      width: 80%;
      padding: 14px 0;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);

      /*가로 중앙 정렬*/
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    button:hover {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
    }

    a {
      color: #aad8ff;
      text-decoration: none;
      font-size: 0.9rem;
      display: block;
      text-align: center;
      margin-top: 16px;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="container">
    <div class="glass-card">
      <h2 style="text-align: center; margin-bottom: 40px;">Register for Helper</h2>
      {% if form.errors %}
        <div style="color: red; margin-bottom: 20px;">
          {% for field in form %}
            {% for error in field.errors %}
              <p>{{ error }}</p>
            {% endfor %}
          {% endfor %}
          {% for error in form.non_field_errors %}
            <p>{{ error }}</p>
          {% endfor %}
        </div>
      {% endif %}
      <form method="POST" action="">
        {% csrf_token %}

        <label class="form-label" for="username">ID</label>
        <input type="text" name="username" id="username" class="form-input" required />

        <label class="form-label" for="email">E-MAIL</label>
        <input type="email" name="email" id="email" class="form-input" required />

        <label class="form-label" for="password1">PW</label>
        <input type="password" name="password1" id="password1" class="form-input" required />

        <label class="form-label" for="password2">CONFIRM PW</label>
        <input type="password" name="password2" id="password2" class="form-input" required />

        <button type="submit">Sign Up</button>
      </form>
      <a href="{% url 'login' %}">이미 계정이 있으신가요? 로그인</a>
    </div>
  </div>

  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 140, density: { enable: true, value_area: 1000 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: {
          value: 0.6,
          random: true,
          anim: { enable: true, speed: 0.7, opacity_min: 0.1, sync: false }
        },
        size: { value: 4, random: true },
        move: {
          enable: true,
          speed: 0.7,
          direction: "none",
          random: true,
          straight: false,
          out_mode: "out"
        },
        line_linked: { enable: false }
      },
      interactivity: {
        events: { onhover: { enable: false }, onclick: { enable: false } }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
