{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>공고 추천 중...</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000080;
        }
        body {
            background-color: #f4f4f8;
            font-family: 'Pretendard', sans-serif;
            padding-left: 80px;
            color: #343a40;
            transition: padding-left 0.3s ease-in-out;
        }
        body:has(.sidebar:hover) {
            padding-left: 240px;
        }
        .content-area {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .selected-resume-container {
            width: 100%;
            margin-bottom: 40px;
        }
        .selected-resume-card {
            background: linear-gradient(135deg, #e6e6ff 0%, #f0f0ff 100%);
            border-radius: 16px;
            padding: 25px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }
        .loading-prompt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a2b48;
        }
        .loading-prompt i {
            font-size: 3rem;
            color: var(--primary-color);
        }
        .cancel-btn {
            margin-top: 60px;
            background-color: #6c757d;
            color: white;
            border: none; padding: 14px 40px;
            font-size: 1rem; font-weight: 600;
            border-radius: 12px; text-decoration: none;
            transition: all 0.2s;
        }
    </style>
</head>
<body class="resume-page">
    {% include '_sidebar.html' %}

    <div class="content-area">
        <div class="selected-resume-container">
            {% for resume in selected_resumes %}
            <div class="selected-resume-card">
                {{ resume.title }}
            </div>
            {% endfor %}
        </div>

        <div class="loading-prompt">
            <i class="fas fa-spinner fa-spin"></i>
            <span>이력 사항과 매칭되는 공고를 찾는 중입니다...</span>
        </div>

        <a href="{% url 'resume_list' %}" class="cancel-btn">취소</a>
    </div>
</body>
</html>
