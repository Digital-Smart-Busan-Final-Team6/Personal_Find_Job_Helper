{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>회원가입</title>
    <link rel="stylesheet" href="{% static 'style.css' %}"/>
</head>
<body>
<div id="register-container" class="container active">
    <h1 class="title">회원가입</h1>

    {% if messages %}
        <ul class="messages">
            {% for msg in messages %}
                <li class="error">{{ msg }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form id="register-form" method="post" action="{% url 'register' %}">
        {% csrf_token %}
        <!-- (기존 회원가입 입력 폼) -->
        <button type="submit" class="btn-primary">회원가입하기</button>
    </form>

    <p class="note">
        이미 회원이신가요?
        <a href="{% url 'login' %}">로그인하기</a>
    </p>
</div>
</body>
</html>
